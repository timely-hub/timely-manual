site_name: 타임리GPT 사용설명서
site_description: Timely AI 서비스 사용설명서
site_url: https://timely-hub.github.io/timely-manual/
repo_url: https://github.com/timely-hub/timely-manual
repo_name: timely-hub/timely-manual
edit_uri: edit/master/docs/

nav:
  - 홈: index.md
  - 어드민 가이드:
      - 시작하기:
          - 스페이스 설정: admin/getting-started/space-setup.md
          - 유저 초대·관리: admin/getting-started/invite-users.md
          - 템플릿 관리: admin/getting-started/templates.md
          - 크레딧 결제: admin/getting-started/credits.md
      - 기능 더보기:
          - 회원가입·로그인: admin/reference/signup-login.md
          - 유저 관리: admin/reference/user-management.md
          - 템플릿 관리: admin/reference/template-management.md
          - 스페이스 관리: admin/reference/space-management.md
          - 크레딧 결제: admin/reference/credits.md
          - 통계: admin/reference/stats.md
  - 유저 가이드:
      - 시작하기:
          - 개요: user/getting-started/overview.md
          - 서비스 활용하기: user/getting-started/services.md
          - 템플릿: user/getting-started/templates.md
          - Labs: user/getting-started/labs.md
          - 내 계정 설정: user/getting-started/my-account.md
      - 기능 더보기:
          - 워크스페이스: user/reference/workspaces.md
          - 다양한 LLM 채팅: user/reference/llm-chat.md
          - 권한: user/reference/permissions.md
          - 계정 관리: user/reference/account.md
          - 템플릿 만들기: user/reference/templates-build.md
          - 타임리 AI 에이전트: user/reference/ai-agents.md
  - FAQ: faq.md
  - 참고:
      - 할루시네이션 줄이기: hallucination.md

theme:
  name: material
  language: ko
  logo: assets/img/favicon.svg
  favicon: assets/img/favicon.ico
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow
  # Light is the default. OS preference is intentionally NOT auto-detected
  # so the manual matches the Timely service (which is light-themed) out of the box.
  # Users can still manually toggle to dark via the header icon.
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: 다크 모드로 전환
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: 라이트 모드로 전환
  font:
    text: Pretendard
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/css/brand.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang:
        - ko
        - en

extra:
  social:
    - icon: fontawesome/solid/house
      link: https://www.timelygpt.co.kr/main
      name: 타임리GPT 홈페이지

copyright: © Timely. All rights reserved.
